<svg width="1440" height="680" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="Hiragino Sans GB, PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <marker id="ar-req" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="ar-res" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect fill="#f8f9fa" stroke="#e2e8f0" x="0.5" y="0.5" width="719" height="339" rx="12"/>

  <rect fill="#fff" x="20" y="20" width="330" height="300" rx="8" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="185" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">浏览器（前端环境）</text>
  <rect fill="#f8fafc" stroke="#cbd5e1" x="40" y="58" width="290" height="160" rx="6"/>
  <rect x="40" y="58" width="290" height="28" rx="6" fill="#3b82f6"/>
  <rect x="40" y="80" width="290" height="6" fill="#3b82f6"/>
  <text x="185" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Vue 前端应用</text>

  <rect fill="#fff" stroke="#cbd5e1" x="55" y="98" width="85" height="32" rx="4"/>
  <text x="98" y="118" text-anchor="middle" font-size="11" fill="#475569">Header</text>
  <rect fill="#fff" stroke="#cbd5e1" x="148" y="98" width="85" height="32" rx="4"/>
  <text x="191" y="118" text-anchor="middle" font-size="11" fill="#475569">BlogCard</text>
  <rect fill="#fff" stroke="#cbd5e1" x="241" y="98" width="75" height="32" rx="4"/>
  <text x="278" y="118" text-anchor="middle" font-size="11" fill="#475569">Footer</text>
  <rect x="55" y="140" width="261" height="32" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="185" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Axios（HTTP 请求工具）</text>
  <rect x="120" y="182" width="130" height="22" rx="11" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="0.5"/>
  <text x="185" y="197" text-anchor="middle" font-size="10" fill="#4338ca">端口 :5173</text>
  <text x="185" y="232" text-anchor="middle" font-size="10" fill="#94a3b8">import 静态数据 ×</text>
  <text x="185" y="248" text-anchor="middle" font-size="10" fill="#3b82f6">HTTP 请求 → ✓</text>

  <rect fill="#fff" x="370" y="20" width="330" height="300" rx="8" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="535" y="42" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Node.js 进程（后端环境）</text>
  <rect fill="#f8fafc" stroke="#cbd5e1" x="390" y="58" width="290" height="160" rx="6"/>
  <rect x="390" y="58" width="290" height="28" rx="6" fill="#10b981"/>
  <rect x="390" y="80" width="290" height="6" fill="#10b981"/>
  <text x="535" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Express 后端</text>

  <rect x="405" y="98" width="95" height="32" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="452" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">CORS 放行</text>
  <rect fill="#fff" stroke="#cbd5e1" x="508" y="98" width="158" height="32" rx="4"/>
  <text x="587" y="111" text-anchor="middle" font-size="10" fill="#475569">GET /api/posts</text>
  <text x="587" y="124" text-anchor="middle" font-size="9" fill="#94a3b8">GET /api/posts/:id</text>
  <rect x="405" y="140" width="261" height="32" rx="4" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="535" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">假数据变量（posts.js）</text>
  <rect x="470" y="182" width="130" height="22" rx="11" fill="#d1fae5" stroke="#6ee7b7" stroke-width="0.5"/>
  <text x="535" y="197" text-anchor="middle" font-size="10" fill="#047857">端口 :3000</text>
  <rect x="420" y="218" width="230" height="22" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="535" y="233" text-anchor="middle" font-size="10" fill="#92400e">阶段 4 → 替换为 MySQL</text>

  <line x1="335" y1="130" x2="383" y2="130" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#ar-req)"/>
  <rect x="343" y="110" width="32" height="15" rx="4" fill="#dbeafe"/>
  <text x="359" y="121" text-anchor="middle" font-size="8" font-weight="600" fill="#1d4ed8">请求</text>
  <line x1="383" y1="166" x2="335" y2="166" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#ar-res)"/>
  <rect x="343" y="172" width="32" height="15" rx="4" fill="#fef3c7"/>
  <text x="359" y="183" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">JSON</text>

  <rect fill="#f1f5f9" stroke="#cbd5e1" x="120" y="278" width="480" height="44" rx="8" stroke-width="0.5"/>
  <text x="360" y="296" text-anchor="middle" font-size="10" fill="#64748b">两个独立进程 ｜ HTTP 通信 ｜ 端口不同 → 浏览器算跨域 → CORS 放行才能通</text>
  <text x="360" y="312" text-anchor="middle" font-size="10" fill="#94a3b8">阶段 3 聚焦这条链路；数据库、登录、部署等后续阶段逐步加入</text>
</svg>
